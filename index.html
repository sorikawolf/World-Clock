<!doctype html>
<html lang="en">
  <link rel="stylesheet" href="src/styles.css" />
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>World Clock Homework</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.6.0/moment-timezone-with-data-1970-2030.min.js"></script>
  </head>
  <body>

    <div class="container">
    <h1>World Clock</h1>

    <select id="selectedCity">
      <option value="">Select a city...</option>
      <option value="current">My Location</option>
      <option value="America/New_York">New York</option>
      <option value="America/St_Johns">St Johns</option> 
      <option value="Europe/Paris">Paris</option> 
      <option value="Asia/Bangkok">Bangkok</option>

    </select>
   
<div id="cities">
    <div class="city" id="los-angeles">
      <div>
      <h2>Los Angeles 🇺🇸</h2>
      <div class="date"></div>
      </div>
      <div class="time"></div>
    </div>
     <div class="city " id="toronto">
      <div>
      <h2>Toronto 🇨🇦</h2>
      <div class="date"></div>
      </div>
      <div class="time"></div>
   </div>
    </div>
    <footer>
      This project was coded by <strong>Sorika Wolf</strong> and is open-sourced on
      <a href="https://github.com/sorikawolf/World-Clock" target="_blank"
        >GitHub</a
      > and is hosted on <a href="https://sorikawolf.github.io/World-Clock/" target="_blank"
        >GitHub Pages</a
    </footer>

    <script src="src/index.js"></script>
  </body>
</html>
