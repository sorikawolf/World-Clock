<!doctype html>
<html lang="en">
  <link rel="stylesheet" href="src/styles.css" />
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>World Clock Homework</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.30.1/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment-timezone/0.6.0/moment-timezone-with-data-1970-2030.min.js"></script>
  </head>
  <body>

    <div class="container">
    <h1>World Clock</h1>

    <select>
      <option value="">Select a city...</option>
      <option value="">New York</option>
      <option value="">San Francisco</option> 
      <option value="">Paris</option> 
      <option value="">Thailand</option>

    </select>
    </div>

    <div class="city">
      <h2>Los Angeles</h2>
      <div class="date">March 2 2026</div>
      <div class="time">10:00 AM</div>
    </div>
    <div class="city">
      <h2>Quebec</h2>
      <div class="date">March 2 2026</div>
      <div class="time">10:00 AM</div>
    </div>
    <footer>
      This project was coded by Sorika Wolf and is open-sourced on
      <a href="https://github.com/sorikawolf/World-Clock" target="_blank"
        >GitHub</a
      > and is hosted on <a href="https://sorikawolf.github.io/World-Clock/" target="_blank"
        >GitHub Pages</a
    </footer>

    <script src="src/index.js"></script>
  </body>
</html>
